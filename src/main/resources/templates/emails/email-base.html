<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject}">Patient Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0ff; padding: 24px; }
        .wrapper { max-width: 580px; margin: 0 auto; }
        .header { background: #6366f1; border-radius: 12px 12px 0 0; padding: 28px 32px; text-align: center; }
        .header .logo { color: white; font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
        .header .subtitle { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 4px; }
        .body { background: white; padding: 36px 32px; }
        .greeting { font-size: 18px; font-weight: 600; color: #1e1e2e; margin-bottom: 8px; }
        .message { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 24px; }
        .detail-card { background: #f8f9ff; border-left: 4px solid #6366f1; border-radius: 0 8px 8px 0; padding: 16px 20px; margin-bottom: 24px; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eef2ff; font-size: 13px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #888; }
        .detail-value { color: #333; font-weight: 500; text-align: right; }
        .btn { display: inline-block; background: #6366f1; color: white !important; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 500; margin-top: 8px; }
        .btn-outline { display: inline-block; border: 1.5px solid #6366f1; color: #6366f1 !important; text-decoration: none; padding: 10px 24px; border-radius: 8px; font-size: 13px; margin-top: 8px; margin-left: 8px; }
        .footer { background: #f8f9ff; border-radius: 0 0 12px 12px; padding: 20px 32px; text-align: center; }
        .footer p { font-size: 12px; color: #aaa; line-height: 1.6; }
        .footer a { color: #6366f1; text-decoration: none; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-success { background: #f0fff4; color: #2e7d32; }
        .badge-danger { background: #fff0f0; color: #c62828; }
        .badge-warning { background: #fff8f0; color: #e65100; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <div class="logo">+ Patient Portal</div>
        <div class="subtitle">Sistema de Clínica Médica</div>
    </div>
    <div th:replace="${templateBody}"></div>
    <div class="footer">
        <p>Este es un correo automático, por favor no responder directamente.</p>
        <p style="margin-top:6px;">¿Tienes dudas? <a href="#">Contáctanos</a></p>
        <p style="margin-top:10px;color:#ccc;">© 2026 Patient Portal · Clínica Médica</p>
    </div>
</div>
</body>
</html>
