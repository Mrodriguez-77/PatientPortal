<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Portal — Citas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  </head>
<body>

<nav class="portal-navbar">
  <a class="portal-logo" href="/pages/dashboard.html">+ Patient Portal</a>
  <div class="nav-links">
    <a href="/pages/dashboard.html" class="nav-link">Inicio</a>
    <a href="/pages/appointments.html" class="nav-link">Citas</a>
    <a href="/pages/notifications.html" class="nav-link">
      Notificaciones
      <span id="notifBadge" class="notif-badge d-none">0</span>
    </a>
    <a href="/pages/ws-demo.html" class="nav-link">Tiempo Real</a>
    <div class="dropdown-portal" id="userDropdown">
      <span class="nav-user" id="navPatientName" onclick="toggleDropdown()">▾</span>
      <div class="dropdown-menu-portal">
        <div class="dropdown-header">
          <div class="user-name" id="dropdownName"></div>
          <div class="user-email" id="dropdownEmail"></div>
        </div>
        <a href="/pages/profile.html" class="dropdown-item-portal">Mi perfil</a>
        <a href="/pages/profile.html#cambiar-password" class="dropdown-item-portal">Cambiar contraseña</a>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item-portal danger" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-container">

  <div class="page-header">
    <h5>Mis citas</h5>
    <p>Agenda y gestiona tus citas médicas</p>
  </div>

  <!-- TABS -->
  <div class="d-flex gap-2 mb-4">
    <button class="tab-btn active" id="tabDoctors" onclick="showTab('doctors')">
      Médicos disponibles
    </button>
    <button class="tab-btn" id="tabHistory" onclick="showTab('history')">
      Historial de citas
    </button>
  </div>

  <!-- MEDICOS DISPONIBLES -->
  <div id="panelDoctors">
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <input type="text" id="specialtyFilter" class="form-control custom-input"
               placeholder="Filtrar por especialidad..." oninput="filterDoctors()">
      </div>
    </div>
    <div id="doctorsList" class="row g-3">
      <div class="col-12"><div class="empty-state">Cargando médicos...</div></div>
    </div>
  </div>

  <!-- HISTORIAL DE CITAS -->
  <div id="panelHistory" class="d-none">
    <div class="d-flex gap-2 mb-3 flex-wrap">
      <button class="filter-btn active" onclick="filterByStatus('')">Todas</button>
      <button class="filter-btn" onclick="filterByStatus('SCHEDULED')">Agendadas</button>
      <button class="filter-btn" onclick="filterByStatus('CONFIRMED')">Confirmadas</button>
      <button class="filter-btn" onclick="filterByStatus('COMPLETED')">Completadas</button>
      <button class="filter-btn" onclick="filterByStatus('CANCELLED')">Canceladas</button>
    </div>
    <div id="appointmentsList">
      <div class="empty-state">Cargando citas...</div>
    </div>
    <div id="paginationAppointments" class="d-flex justify-content-center gap-2 mt-3"></div>
  </div>

</div>

<!-- MODAL AGENDAR CITA -->
<div id="modalOverlay" class="modal-overlay d-none" onclick="closeModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h6 style="color:#6366f1;margin:0;">Agendar cita</h6>
      <button onclick="closeModal()" style="background:none;border:none;font-size:18px;color:#aaa;cursor:pointer;">×</button>
    </div>
    <div id="modalDoctorInfo" class="mb-3 p-3" style="background:#f8f9ff;border-radius:8px;font-size:13px;"></div>
    <div class="mb-3">
      <label class="form-label small text-muted">Fecha y hora</label>
      <input type="datetime-local" id="appointmentDateTime" class="form-control custom-input">
    </div>
    <div id="modalError" class="alert alert-danger d-none" style="font-size:13px;"></div>
    <div id="modalSuccess" class="alert alert-success d-none" style="font-size:13px;"></div>
    <button class="btn custom-btn text-white w-100" onclick="confirmAppointment()">
      Confirmar cita
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/appointments.js"></script>
</body>
</html>
