<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal — Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4">

        <div class="text-center mb-4">
            <span class="portal-logo" style="font-size:20px;">+ Patient Portal</span>
        </div>

        <div id="loginCard" class="card auth-card">
            <div class="card-body p-4">
                <h5 class="card-title mb-1">Bienvenido</h5>
                <p class="text-muted mb-4" style="font-size:13px;">Ingresa a tu cuenta</p>
                <div id="loginError" class="alert alert-danger d-none" style="font-size:13px;"></div>

                <form onsubmit="event.preventDefault(); handleLogin();">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Correo electrónico</label>
                        <input type="email" id="loginEmail" class="form-control custom-input" placeholder="user@test.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted">Contraseña</label>
                        <input type="password" id="loginPassword" class="form-control custom-input" placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn custom-btn text-white w-100 mb-3">Ingresar</button>
                </form>

                <p class="text-center text-muted mb-0" style="font-size:13px;">
                    ¿No tienes cuenta?
                    <a href="#" class="portal-link" onclick="showRegister()">Regístrate aquí</a>
                </p>
            </div>
        </div>

        <div id="registerCard" class="card auth-card d-none">
            <div class="card-body p-4">
                <h5 class="card-title mb-1">Crear cuenta</h5>
                <p class="text-muted mb-4" style="font-size:13px;">Completa tus datos</p>
                <div id="registerError" class="alert alert-danger d-none" style="font-size:13px;"></div>
                <div id="registerSuccess" class="alert alert-success d-none" style="font-size:13px;"></div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Nombre completo</label>
                    <input type="text" id="regFullName" class="form-control custom-input" placeholder="Ana Martinez">
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Correo electrónico</label>
                    <input type="email" id="regEmail" class="form-control custom-input" placeholder="ana@test.com">
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Contraseña</label>
                    <input type="password" id="regPassword" class="form-control custom-input" placeholder="Mínimo 8 caracteres">
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label small text-muted">Fecha de nacimiento</label>
                        <input type="date" id="regBirthDate" class="form-control custom-input">
                    </div>
                    <div class="col">
                        <label class="form-label small text-muted">Teléfono</label>
                        <input type="text" id="regPhone" class="form-control custom-input" placeholder="78901234">
                    </div>
                </div>
                <button class="btn custom-btn text-white w-100 mb-3" onclick="handleRegister()">Crear cuenta</button>
                <p class="text-center text-muted mb-0" style="font-size:13px;">
                    ¿Ya tienes cuenta?
                    <a href="#" class="portal-link" onclick="showLogin()">Inicia sesión</a>
                </p>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/index.js"></script>
</body>
</html>
