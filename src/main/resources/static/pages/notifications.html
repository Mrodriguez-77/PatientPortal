<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal — Notificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>

<nav class="portal-navbar">
    <a class="portal-logo" href="/pages/dashboard.html">+ Patient Portal</a>
    <div class="nav-links">
        <a href="/pages/dashboard.html" class="nav-link">Inicio</a>
        <a href="/pages/appointments.html" class="nav-link">Citas</a>
        <a href="/pages/notifications.html" class="nav-link active">
            Notificaciones
            <span id="notifBadge" class="notif-badge d-none">0</span>
        </a>
        <a href="/pages/ws-demo.html" class="nav-link">Tiempo Real</a>
        <div class="dropdown-portal" id="userDropdown">
            <span class="nav-user" id="navPatientName" onclick="toggleDropdown()">▾</span>
            <div class="dropdown-menu-portal">
                <div class="dropdown-header">
                    <div class="user-name" id="dropdownName"></div>
                    <div class="user-email" id="dropdownEmail"></div>
                </div>
                <a href="/pages/profile.html" class="dropdown-item-portal">Mi perfil</a>
                <a href="/pages/profile.html#cambiar-password" class="dropdown-item-portal">Cambiar contraseña</a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item-portal danger" onclick="logout()">Cerrar sesión</button>
            </div>
        </div>
    </div>
</nav>

<div class="page-container">

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h5>Notificaciones</h5>
            <p>Mantente al tanto de tus citas</p>
        </div>
        <button class="btn-outline-portal" onclick="markAllRead()">
            Marcar todas como leídas
        </button>
    </div>

    <div class="d-flex gap-2 mb-4">
        <button class="filter-btn active" onclick="filterNotifications('')">Todas</button>
        <button class="filter-btn" onclick="filterNotifications('false')">No leídas</button>
        <button class="filter-btn" onclick="filterNotifications('true')">Leídas</button>
    </div>

    <div id="notificationsList">
        <div class="empty-state">Cargando notificaciones...</div>
    </div>

    <div id="paginationNotifications" class="d-flex justify-content-center gap-2 mt-3"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>
</body>
</html>
